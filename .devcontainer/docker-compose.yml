services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-UTC}
        GIT_DELTA_VERSION: "0.18.2"
        ZSH_IN_DOCKER_VERSION: "1.2.1"
    volumes:
      - ..:/workspace:cached
      - claude-code-bashhistory:/commandhistory
      - ${HOME}/.claude:/home/vscode/.claude:ro
      - ${HOME}/.config/gh:/home/vscode/.config/gh:ro
      - ${HOME}/.gitconfig:/home/vscode/.gitconfig:ro
      - .:/workspace/.devcontainer:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW
    init: true
    command: sleep infinity
    environment:
      NODE_OPTIONS: "--max-old-space-size=4096"
      CLAUDE_CONFIG_DIR: /home/vscode/.claude
      POWERLEVEL9K_DISABLE_GITSTATUS: "true"
      GIT_CONFIG_GLOBAL: /home/vscode/.gitconfig.local
      UV_LINK_MODE: copy
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
      NPM_CONFIG_AUDIT: "true"
      NPM_CONFIG_FUND: "false"
      NPM_CONFIG_SAVE_EXACT: "true"
      NPM_CONFIG_UPDATE_NOTIFIER: "false"
      NPM_CONFIG_MINIMUM_RELEASE_AGE: "1440"
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      DATABASE_HOST: postgres
      POSTGRES_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  claude-code-bashhistory:
  postgres-data:
  redis-data:
